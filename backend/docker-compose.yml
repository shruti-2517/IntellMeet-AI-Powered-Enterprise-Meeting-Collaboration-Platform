version: '3.9'

services:
  # ── IntellMeet Backend API ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: intellmeet-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - PORT=5000
      - CLIENT_URL=http://localhost:5173
      - MONGODB_URI=mongodb://mongodb:27017/intellmeet
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - intellmeet-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0-jammy
    container_name: intellmeet-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: intellmeet
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - intellmeet-network
    restart: unless-stopped
    command: --wiredTigerCacheSizeGB 1
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: intellmeet-redis
    ports:
      - '6379:6379'
    command: >
      redis-server
      --appendonly yes
      --save 60 1000
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - intellmeet-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  intellmeet-network:
    driver: bridge
